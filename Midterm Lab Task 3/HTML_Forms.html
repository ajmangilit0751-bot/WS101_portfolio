<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML_Forms</title>
</head>
<body>
  <form>
  <fieldset>
  <legend><h1 style="color:blue;"</style>Request proposal</h1></legend>
    <table border="0px">
    <tr>
      <td align="right"> <label>Your company: </label></td> 
      <td><input type="text"></td>
    </tr>
    <tr>
      <td align="right"><label>Email: </label></td> 
      <td><input type="email"></td>
    </tr>
    <tr>
      <td align="right"> <label>Username: </label></td>
      <td><input type="text"></td>
    </tr>
    <tr>
      <td align="right"><label>Password: </label></td>
      <td><input type="password>"</td>
    </tr>
    <tr>
      <td align="right"> <label for="message">Your business: </label></td>
      <td><textarea name="message" id="message" cols="50" rows="10" placeholder="Briefly describe your business in this place."></textarea></td>
    </tr>
    <tr>
      <td align="right">Company size:</td>
      <td align="left"><input type="radio" id="Less than 10" value="Less than 10" name="Company size"> <label>Less than 10</label>
    </tr>
    <tr>
      <td></td>
      <td align="left"><input type="radio" id="" value="11-50" name="Company size"> <label>11-50</label>
    </tr>
    <tr>
      <td></td>
      <td align="left"><input type="radio" id="" value="50-200" name="Company size"> <label>50-200</label>
    </tr>
    <tr>
      <td></td>
      <td align="left"><input type="radio" id="" value="Over 200" name="Company size"> <label>Over 200</label>
    </tr>
    <tr>
      <td align="right">Services : </td>
      <td><input type="checkbox">Brand identity <input type="checkbox">New website<input type="checkbox">Web redesign</td>
    </tr>
    <tr>
      <td align="right">Timeline:</td>
      <td>
        <select>
          <option></option>
          <option>Immediately </option>
          <option>1 - 2 Weeks</option>
          <option>3 - 6 Weeks</option>
          <option>Weeks - 2 Months</option>
        </select>
    <tr>
      <td></td>
      <td align="left">
      <button type="submit">Send to dev/design </button>
      </td>
    </tr>
    </tr>
  </table>
  </fieldset>  
  </form>
</body>
</html>
